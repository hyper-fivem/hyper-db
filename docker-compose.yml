services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hyper
      POSTGRES_PASSWORD: hyper
      POSTGRES_DB: hyperdb
    ports:
      # host 5433: leave room for a locally installed PostgreSQL on 5432
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyper -d hyperdb"]
      interval: 5s
      timeout: 3s
      retries: 10

  mariadb:
    image: mariadb:11
    environment:
      MARIADB_USER: hyper
      MARIADB_PASSWORD: hyper
      MARIADB_DATABASE: hyperdb
      MARIADB_ROOT_PASSWORD: root
    ports:
      # host 3307: leave room for a local XAMPP/MariaDB on 3306
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
